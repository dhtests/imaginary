# sync-and-restack.yml
#
# PURPOSE: Keep a fork current with upstream and restack all PR branches.
#
# Runs ONLY in forks (github.event.repository.fork == true).
# Is a no-op in the origin repo.
# No secrets or tokens required — GITHUB_TOKEN is automatic.
# Note: sync only works for non-workflow file changes. For workflow file
#       updates, sync the fork manually once via GitHub's "Sync fork" button.
#
# ON SUCCESS: fork main is synced and all PR branches are restacked and pushed.
# ON CONFLICT: conflicting branches are left untouched, a PR comment is posted,
#   and a failed commit status blocks merging until the author resolves it.
#
# CONFLICT RESOLUTION (for PR authors):
#   git pull
#   git restack              # replays your commit — shows conflicting files
#   # fix conflicts in your editor
#   git add .
#   git restack --continue   # completes the cherry-pick
#   git push --force-with-lease origin <branch>

name: Sync and restack

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write
  pull-requests: write

jobs:
  sync-and-restack:
    if: github.event.repository.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork main with upstream
        id: sync
        run: |
          before=$(gh api repos/${{ github.repository }}/branches/main --jq '.commit.sha')
          gh api repos/${{ github.repository }}/merge-upstream -f branch=main 2>&1 || true
          after=$(gh api repos/${{ github.repository }}/branches/main --jq '.commit.sha')
          if [ "$before" != "$after" ]; then
            echo "moved=true" >> $GITHUB_OUTPUT
            echo "Main moved from $before to $after — will restack."
          else
            echo "moved=false" >> $GITHUB_OUTPUT
            echo "Main unchanged — nothing to restack."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        if: steps.sync.outputs.moved == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-restack
        if: steps.sync.outputs.moved == 'true'
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/davidhadas/git-restack/main/git-restack \
            -o /usr/local/bin/git-restack
          chmod +x /usr/local/bin/git-restack

      - name: Configure git
        if: steps.sync.outputs.moved == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Restack all branches
        if: steps.sync.outputs.moved == 'true'
        run: |
          git fetch --all

          for branch in $(git branch -r | grep -v 'origin/main' | grep -v 'HEAD' | sed 's|origin/||'); do
            [ "$branch" = "main" ] && continue

            echo "--- Restacking $branch ---"
            git checkout "$branch" 2>/dev/null || {
              echo "SKIP $branch: could not checkout"
              continue
            }

            sha=$(git rev-parse HEAD)

            if git restack --auto-cleanup; then
              git push --force-with-lease origin "$branch"
              echo "OK $branch restacked and pushed."

              gh api repos/${{ github.repository }}/statuses/$sha \
                -f state=success \
                -f context="git-restack" \
                -f description="Branch successfully restacked on main"
            else
              echo "CONFLICT $branch: leaving branch untouched."

              gh api repos/${{ github.repository }}/statuses/$sha \
                -f state=failure \
                -f context="git-restack" \
                -f description="Conflict detected — run git restack locally to resolve"

              pr_number=$(gh pr list --head "$branch" --json number --jq '.[0].number' 2>/dev/null)
              if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
                gh pr comment "$pr_number" --body "⚠️ **Auto-restack conflict detected** — branch left untouched. Run \`git restack\` locally, fix conflicts, \`git add .\`, \`git restack --continue\`, then push."
              fi
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
