# sync-fork.yml
#
# PURPOSE: Keep a fork's main branch in sync with upstream automatically.
#
# Runs ONLY in forks (github.event.repository.fork == true).
# Is a no-op in the origin repo.
# No secrets or tokens need to be configured — GITHUB_TOKEN is automatic.
#
# Polls every 3 minutes (test cadence — change to */30 for production).
# When upstream main is ahead, syncs the fork's main, which triggers
# restack-prs.yml to restack all open PR branches automatically.

name: Sync fork with upstream

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.event.repository.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork main with upstream
        run: |
          gh api repos/${{ github.repository }}/merge-upstream \
            -f branch=main 2>&1 || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
